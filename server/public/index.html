<script>
  // Never show a blank page: surface load/runtime failures to the user.
  function swiftShowError(msg, detail){
    var r = document.getElementById('root'); if(!r) return;
    r.innerHTML = '<div style="max-width:560px;margin:48px auto;font-family:Inter,system-ui,sans-serif;padding:28px;border:1px solid #fee2e2;background:#fff;border-radius:16px;color:#0A2540;box-shadow:0 1px 3px rgba(10,37,64,.08)">'
      + '<div style="font-size:28px">⚠️</div><h2 style="margin:8px 0 6px;font-size:18px">' + msg + '</h2>'
      + '<p style="color:#64748b;font-size:13px;line-height:1.5;margin:0">' + (detail||'') + '</p>'
      + '<p style="color:#94a3b8;font-size:12px;margin-top:12px">This preview loads React, Tailwind and Chart.js from a CDN, so it needs internet access. Reload once you are online.</p></div>';
  }
  window.addEventListener('error', function(e){ if(document.getElementById('boot')) swiftShowError('Something failed to load', (e && e.message) || 'Script error'); });
  setTimeout(function(){
    if(!document.getElementById('boot')) return;
    var missing = [];
    if(!window.React) missing.push('React');
    if(!window.ReactDOM) missing.push('ReactDOM');
    if(!window.Babel) missing.push('Babel');
    if(!window.Chart) missing.push('Chart.js');
    if(missing.length) swiftShowError('Could not load required libraries', 'Missing: ' + missing.join(', ') + '.');
  }, 7000);
</script>

function delay(data, ms){ return new Promise(function(res){ setTimeout(function(){ res(data); }, ms||300); }); }

/* =========================================================================
   WHERE IS THE BACKEND?  (read this if you deploy)
   -------------------------------------------------------------------------
   • Leave BACKEND_URL = '' to (a) use the live database when this file is
     served by your own backend (http://localhost:4000), or (b) run as a
     self-contained DEMO with built-in data when hosted on GitHub Pages or
     opened directly from disk.
   • Once you host the backend on a free server (e.g. Render), paste its URL
     here, e.g.  const BACKEND_URL = 'https://swift-api.onrender.com';
     Then the GitHub Pages site will use your REAL database.
========================================================================= */
const BACKEND_URL = ''; // <<< paste your hosted backend URL here to go fully live
const API_BASE =
  BACKEND_URL ? (BACKEND_URL.replace(/\/$/, '') + '/api')
  : ((location.protocol === 'http:' || location.protocol === 'https:') ? '/api' : null);

async function apiGet(path, fallback){
  if(!API_BASE) return delay(fallback);
  try{
    const r = await fetch(API_BASE + path, { credentials:'include' });
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  }catch(err){ console.warn('[api] offline — using demo data for', path); return delay(fallback); }
}
async function apiPost(path, body, fallback){
  if(!API_BASE) return delay(fallback);
  try{
    const r = await fetch(API_BASE + path, { method:'POST', headers:{ 'Content-Type':'application/json' }, credentials:'include', body: JSON.stringify(body||{}) });
    if(!r.ok){ const e = await r.json().catch(function(){ return {}; }); throw new Error(e.error || ('HTTP ' + r.status)); }
    return await r.json();
  }catch(err){ console.warn('[api] offline — using demo response for', path); return delay(fallback); }
}

function useHashRoute(){
  const [route,setRoute] = useState(window.location.hash.replace('#','') || '/');
  useEffect(function(){
    const on = ()=>{ setRoute(window.location.hash.replace('#','') || '/'); window.scrollTo(0,0); };
    window.addEventListener('hashchange', on);
    return ()=> window.removeEventListener('hashchange', on);
  }, []);
  return route;
}

/* Chart.js wrapper */
function ChartCanvas({ type, data, options, height=200 }){
  const ref = useRef(null); const inst = useRef(null);
  useEffect(function(){
    if(!ref.current) return;
    inst.current = new ChartJS(ref.current, { type:type, data:data, options:options });
    return ()=>{ if(inst.current) inst.current.destroy(); };
  }, [JSON.stringify(data), type]);
  const box = { height: height + 'px' };
  return <div style={box}><canvas ref={ref}/></div>;
}

      <Card className="p-5 text-center">
        <p className="text-xs uppercase tracking-wide text-slate-400">Amount to pay</p>
        <p className="text-4xl font-extrabold text-navy-700 dark:text-white mt-1">{cedi0(depositAmount||0)}</p>
      </Card>
      <Card className="p-5 text-center">
        <p className="text-xs uppercase tracking-wide text-slate-400">Receiver number</p>
        <p className="text-3xl font-extrabold tracking-wider text-navy-700 dark:text-white mt-1">{PAYEE.number}</p>
        <button onClick={copyNum} className="mt-2 text-sm font-semibold text-brand inline-flex items-center gap-1"><Icon d="M8 8h10v12H8zM6 16H4V4h12v2" className="w-4 h-4"/> {copied?'Copied!':'Copy number'}</button>
        <div className="mt-4 pt-4 border-t border-slate-100 dark:border-white/10">
          <p className="text-xs uppercase tracking-wide text-slate-400">Receiver name</p>
          <p className="text-xl font-extrabold text-navy-700 dark:text-white mt-0.5">{PAYEE.name}</p>
          <div className="mt-2"><Badge tone="gold">{PAYEE.note}</Badge></div>
        </div>
      </Card>
      <Card className="p-4">
        <h4 className="font-bold text-sm text-navy-700 dark:text-white mb-2">Payment instructions</h4>
        <ol className="text-sm text-slate-500 dark:text-slate-400 space-y-1.5 list-decimal pl-4">
          <li>Dial your Telecel Cash menu or open the app.</li>
          <li>Choose <strong>Send Money</strong> and enter <strong>{PAYEE.number}</strong>.</li>
          <li>Enter the exact amount <strong>{cedi0(depositAmount||0)}</strong>.</li>
          <li>Confirm the receiver name is <strong>{PAYEE.name}</strong>, then approve with your PIN.</li>
          <li>Tap <strong>I have paid</strong> below once done.</li>
        </ol>
        <p className="text-xs text-loss mt-3">⚠️ Complete payment before the timer runs out, or restart the deposit.</p>
      </Card>
      <Button size="lg" variant="success" disabled={expired} onClick={()=>setPaid(true)}>{expired?'Time expired — restart':'I have paid'}</Button>
      <Modal open={paid} onClose={()=>setPaid(false)} title="Payment submitted">
        <div className="text-center">
          <div className="text-4xl">✅</div>
          <p className="mt-2 text-sm text-slate-600 dark:text-slate-300">We're confirming your payment of <strong>{cedi0(depositAmount||0)}</strong>. Your wallet will be credited shortly.</p>
          <Button className="mt-4" onClick={()=>{ setPaid(false); go('/dashboard'); }}>Done</Button>
        </div>
      </Modal>
    </div>
  );
}

/* ---------- Withdraw ---------- */
function Withdraw(){
  const [acct,setAcct]=useState('');
  const [num,setNum]=useState('');
  const [amt,setAmt]=useState('');
  const [modal,setModal]=useState(false);
  const submit=(e)=>{
    e.preventDefault();
    var n = Number(amt);
    // useful JS prompt: validate against balance, then confirm
    if(!n || n<=0){ window.alert('⚠️ Enter a valid withdrawal amount.'); return; }
    if(n > MOCK.available){ window.alert('⚠️ Amount exceeds your available balance of ' + cedi(MOCK.available) + '.'); return; }
    var ok = window.confirm('Withdraw ' + cedi(n) + ' to ' + (acct||'your account') + ' (' + (num||'—') + ')?');
    if(!ok) return;
    setModal(true);
  };
  return (
    <div className="space-y-4">
      {/* balance on top */}
      <div className="rounded-3xl bg-gradient-to-br from-navy-700 to-brand text-white p-5 shadow-pop">
        <p className="text-sm text-slate-200">Available balance</p>
        <p className="text-3xl font-extrabold mt-1">{cedi(MOCK.available)}</p>
        <p className="text-xs text-slate-300 mt-1">Withdrawable now</p>
      </div>
      <h2 className="text-xl font-extrabold text-navy-700 dark:text-white">Withdraw funds</h2>
      <Card className="p-5">
        <form onSubmit={submit} className="space-y-4">
          <Field label="Withdrawal account" placeholder="Account name (e.g. Emma Highest)" value={acct} onChange={(e)=>setAcct(e.target.value)}/>
          <Field label="Withdrawal number" type="tel" placeholder="e.g. 0541234567" value={num} onChange={(e)=>setNum(e.target.value)}/>
          <label className="block">
            <span className="text-sm font-medium text-navy-700 dark:text-slate-200">Amount</span>
            <div className="mt-1 relative">
              <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₵</span>
              <input value={amt} onChange={(e)=>setAmt(e.target.value)} type="number" placeholder="0.00" className="w-full rounded-xl border border-slate-300 dark:border-white/15 bg-white dark:bg-navy-900 pl-8 pr-3 py-3 text-sm focus:ring-2 focus:ring-brand/40 focus:border-brand outline-none"/>
            </div>
          </label>
          <Button size="lg" variant="danger" disabled={!acct||!num||!amt}>Request withdrawal</Button>
        </form>
      </Card>
      <Card className="p-4">
        <h4 className="font-bold text-sm text-navy-700 dark:text-white mb-2">Withdrawal instructions</h4>
        <ol className="text-sm text-slate-500 dark:text-slate-400 space-y-1.5 list-decimal pl-4">
          <li>Enter the account name and mobile money number to receive funds.</li>
          <li>Enter the amount (must not exceed your available balance).</li>
          <li>Withdrawals are reviewed and processed within 24 hours.</li>
          <li>Double-check your number — funds sent to a wrong number cannot be recovered.</li>
        </ol>
      </Card>
      <Modal open={modal} onClose={()=>setModal(false)} title="Confirm withdrawal">
        <div className="space-y-1.5 text-sm">
          <div className="flex justify-between"><span className="text-slate-500">Account</span><span className="font-bold">{acct||'—'}</span></div>
          <div className="flex justify-between"><span className="text-slate-500">Number</span><span className="font-bold">{num||'—'}</span></div>
          <div className="flex justify-between"><span className="text-slate-500">Amount</span><span className="font-bold">{amt?cedi(Number(amt)):'₵0.00'}</span></div>
        </div>
        <p className="text-xs text-slate-400 mt-3">This is a demo — no real funds will move.</p>
        <div className="flex gap-2 mt-5"><Button variant="outline" className="flex-1" onClick={()=>setModal(false)}>Cancel</Button><Button variant="danger" className="flex-1" onClick={()=>{ setModal(false); go('/dashboard'); }}>Confirm</Button></div>
      </Modal>
    </div>
  );
}

/* ---------- Transactions ---------- */
function TxnList({ rows }){
  const tone = (t)=> (t==='Deposit'||t==='Income')?'profit':t==='Withdrawal'?'loss':'brand';
  const stone = (s)=> s==='Completed'?'profit':s==='Pending'?'amber':'loss';
  const sign = (t)=> (t==='Withdrawal'||t==='Investment')?'-':'+';
  return (
    <div className="space-y-2">
      {rows.map(function(t){
        return (
          <Card key={t.id} className="p-3.5 flex items-center gap-3">
            <span className={cx('w-9 h-9 rounded-xl grid place-items-center', tone(t)==='profit'?'bg-profit-soft text-profit':tone(t)==='loss'?'bg-loss-soft text-loss':'bg-blue-50 text-brand')}>
              <Icon d={t.type==='Withdrawal'?'M12 19V5M5 12l7-7 7 7':t.type==='Deposit'||t.type==='Income'?'M12 5v14M19 12l-7 7-7-7':'M4 7h16M4 12h16M4 17h10'} className="w-4 h-4"/>
            </span>
            <div className="flex-1"><p className="font-semibold text-sm">{t.type}</p><p className="text-xs text-slate-400">{t.date} · {t.id}</p></div>
            <div className="text-right"><p className={cx('font-bold text-sm', tone(t)==='loss'?'text-loss':'text-navy-700 dark:text-white')}>{sign(t)}{cedi0(t.amount)}</p><Badge tone={stone(t.status)}>{t.status}</Badge></div>
          </Card>
        );
      })}
    </div>
  );
}
function Transactions(){
  const [rows,setRows]=useState(null); const [filter,setFilter]=useState('All');
  useEffect(function(){ api.getTransactions().then(setRows); }, []);
  const types=['All','Deposit','Withdrawal','Income','Investment'];
  const shown = rows ? (filter==='All'?rows:rows.filter(function(r){ return r.type===filter; })) : null;
  return (
    <div className="space-y-4">
      <h2 className="text-xl font-extrabold text-navy-700 dark:text-white">Transactions</h2>
      <div className="flex gap-2 overflow-x-auto no-scrollbar -mx-1 px-1">
        {types.map(function(t){
          return <button key={t} onClick={()=>setFilter(t)} className={cx('shrink-0 text-xs font-semibold px-3.5 py-2 rounded-full transition-colors', filter===t?'bg-brand text-white':'bg-white dark:bg-navy-800 border border-slate-200 dark:border-white/10 text-slate-600 dark:text-slate-300')}>{t}</button>;
        })}
      </div>
      {!shown ? <TableSkeleton rows={6}/> : (shown.length ? <TxnList rows={shown}/> : <p className="text-center text-slate-400 py-10 text-sm">No {filter} transactions.</p>)}
    </div>
  );
}

/* ---------- Account (profile + settings + links) ---------- */
function Account(){
  const { dark, setDark, setAuthed } = useApp();
  const links = [
    ['Transactions','M4 7h16M4 12h16M4 17h10','/transactions'],
    ['Investment plans','M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z','/plans'],
    ['Deposit funds','M12 5v14M5 12h14','/deposit'],
    ['Withdraw funds','M12 19V5M5 12l7-7 7 7','/withdraw']
  ];
  return (
    <div className="space-y-4">
      <Card className="p-5 flex items-center gap-4">
        <div className="w-16 h-16 rounded-full bg-brand text-white grid place-items-center text-xl font-bold">{MOCK.user.avatar}</div>
        <div className="flex-1"><h3 className="font-bold text-lg text-navy-700 dark:text-white">{MOCK.user.name}</h3><p className="text-sm text-slate-400">{MOCK.user.phone}</p><div className="mt-1"><Badge tone="brand">{MOCK.user.tier} member</Badge></div></div>
      </Card>
      <Card className="p-2">
        {links.map(function(l){
          return (
            <a key={l[0]} href={'#'+l[2]} className="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-white/5">
              <span className="w-9 h-9 rounded-xl bg-navy-50 dark:bg-white/10 grid place-items-center text-navy-700 dark:text-white"><Icon d={l[1]} className="w-4 h-4"/></span>
              <span className="flex-1 font-semibold text-sm">{l[0]}</span>
              <Icon d="M9 6l6 6-6 6" className="w-4 h-4 text-slate-400"/>
            </a>
          );
        })}
      </Card>
      <Card className="p-4">
        <h4 className="font-bold text-navy-700 dark:text-white mb-3 text-sm">Preferences</h4>
        <div className="space-y-3">
          <div className="flex items-center justify-between"><div><p className="font-semibold text-sm">Dark mode</p><p className="text-xs text-slate-400">Switch theme</p></div><Toggle on={dark} onClick={()=>setDark(!dark)}/></div>
          <div className="flex items-center justify-between"><div><p className="font-semibold text-sm">Two-factor auth</p><p className="text-xs text-slate-400">Extra security</p></div><Toggle on={true}/></div>
          <div className="flex items-center justify-between"><div><p className="font-semibold text-sm">Email alerts</p><p className="text-xs text-slate-400">Trade confirmations</p></div><Toggle on={true}/></div>
        </div>
      </Card>
      <Button variant="outline" onClick={()=>{ if(window.confirm('Sign out of Swift Investments?')){ setAuthed(false); go('/'); } }}>Sign out</Button>
    </div>
  );
}

/* =========================================================================
   ROUTES MAP   >>> REGISTER A NEW PAGE HERE <<<
   isPublic:true => standalone; otherwise wrapped in <AppShell/>.
========================================================================= */
const ROUTES = {
  '/':             { comp:Landing,      isPublic:true },
  '/login':        { comp:Login,        isPublic:true },
  '/register':     { comp:Register,     isPublic:true },
  '/dashboard':    { comp:Dashboard,    title:'Home' },
  '/plans':        { comp:Plans,        title:'Plans' },
  '/deposit':      { comp:Deposit,      title:'Deposit' },
  '/payment':      { comp:Payment,      title:'Payment' },
  '/withdraw':     { comp:Withdraw,     title:'Withdraw' },
  '/transactions': { comp:Transactions, title:'Transactions' },
  '/account':      { comp:Account,      title:'Account' }
  // '/reports':   { comp:Reports, title:'Reports' },  // <-- add future pages here
};
function Router(){
  const route = useHashRoute();
  const key = Object.keys(ROUTES).find(function(k){ return k!=='/' && route.startsWith(k); }) || (route==='/'?'/':null);
  const match = key ? ROUTES[key] : null;
  if(!match){
    return <div className="max-w-md mx-auto min-h-screen grid place-items-center text-center p-6"><div><p className="text-6xl font-extrabold text-navy-200">404</p><p className="mt-2 text-slate-500">Page not found.</p><Button className="mt-4 w-auto px-6" onClick={()=>go('/dashboard')}>Go home</Button></div></div>;
  }
  const Comp = match.comp;
  if(match.isPublic) return <Comp/>;
  return <AppShell route={route} title={match.title}><Comp/></AppShell>;
}
function App(){ return <AppProvider><Router/></AppProvider>; }
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
